<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      -webkit-app-region: drag;
    }
    #office-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -webkit-app-region: drag;
    }
    /* Characters-only mode canvas */
    #char-canvas {
      display: none;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -webkit-app-region: drag;
    }

    /* ─── Hover Controls ─── */
    .overlay-controls {
      position: fixed;
      top: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 100;
      -webkit-app-region: no-drag;
    }
    body:hover .overlay-controls {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      color: #fff;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }
    .overlay-btn:hover {
      background: rgba(0,0,0,0.8);
    }
    .overlay-btn.active {
      background: rgba(59,130,246,0.6);
      border-color: rgba(59,130,246,0.8);
    }
    .overlay-btn svg {
      flex-shrink: 0;
    }

    /* Resize handle */
    .overlay-resize {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      -webkit-app-region: no-drag;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }
    body:hover .overlay-resize {
      opacity: 0.5;
    }
    .overlay-resize svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <canvas id="office-canvas"></canvas>
  <canvas id="char-canvas"></canvas>

  <!-- Hover Controls -->
  <div class="overlay-controls">
    <button class="overlay-btn" id="btnMode" title="Toggle: Office / Characters only">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="5" cy="6" r="3"/>
        <circle cx="11" cy="6" r="3"/>
        <path d="M3 14c0-2.2 1.8-4 4-4h2c2.2 0 4 1.8 4 4"/>
      </svg>
    </button>
    <button class="overlay-btn" id="btnDashboard" title="Open Dashboard">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="2" width="14" height="11" rx="1.5"/>
        <path d="M5 8h6M5 8l2.5-2.5M5 8l2.5 2.5"/>
      </svg>
    </button>
    <button class="overlay-btn" id="btnClose" title="Close Overlay">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="4" y1="4" x2="12" y2="12"/>
        <line x1="12" y1="4" x2="4" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- Resize Handle -->
  <div class="overlay-resize" id="resizeHandle">
    <svg viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
      <line x1="14" y1="4" x2="4" y2="14"/>
      <line x1="14" y1="9" x2="9" y2="14"/>
    </svg>
  </div>

  <script type="module" src="/src/client/overlay.ts"></script>
</body>
</html>
