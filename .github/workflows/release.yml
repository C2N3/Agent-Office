name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: npm run dist:win
            skip_tests: ''
            skip_rebuild: ''
          - os: macos-latest
            cmd: npm run dist:mac:signed
            skip_tests: '1'
            skip_rebuild: '1'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --runInBand

      - name: Prepare App Store Connect API key
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [[ -z "$APPLE_API_KEY_BASE64" || -z "$APPLE_API_KEY_ID" ]]; then
            echo "Missing APPLE_API_KEY_BASE64 or APPLE_API_KEY_ID secret" >&2
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_path = Path(os.environ["RUNNER_TEMP"]) / f'AuthKey_{os.environ["APPLE_API_KEY_ID"]}.p8'
          key_path.write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))
          print(f"APPLE_API_KEY={key_path}", file=open(os.environ["GITHUB_ENV"], "a", encoding="utf-8"))
          PY

      - name: Build
        run: ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_TESTS: ${{ matrix.skip_tests }}
          SKIP_REBUILD: ${{ matrix.skip_rebuild }}
          CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
