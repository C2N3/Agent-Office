<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agent Office Remote</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --accent: #4ade80;
    --accent2: #22c55e;
    --text: #e5e5e5;
    --text2: #888;
    --danger: #f87171;
    --warn: #fbbf24;
    --info: #60a5fa;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 17px; font-weight: 600; flex: 1; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text2);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #status-dot.ok { background: var(--accent); }
  #status-dot.err { background: var(--danger); }

  /* ── Auth screen ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    padding: 24px;
    gap: 16px;
  }
  #auth-screen h2 { font-size: 20px; }
  #auth-screen p { color: var(--text2); font-size: 14px; text-align: center; }
  #token-input {
    width: 100%;
    max-width: 340px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: monospace;
    letter-spacing: 0.5px;
  }
  #token-input:focus { outline: none; border-color: var(--accent); }

  /* ── Main app ── */
  #app { display: none; padding-bottom: 40px; }

  /* ── Section ── */
  section { padding: 16px; }
  section + section { border-top: 1px solid var(--border); }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover:not(:disabled) { background: var(--accent2); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 6px; }
  .btn-full { width: 100%; }

  /* ── Form ── */
  textarea, input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    resize: vertical;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { min-height: 120px; font-family: inherit; line-height: 1.5; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }

  select {
    appearance: none;
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }

  .row { display: flex; gap: 8px; align-items: flex-end; }
  .row .form-group { flex: 1; margin: 0; }

  /* ── Task cards ── */
  #task-list { display: flex; flex-direction: column; gap: 10px; }
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    transition: border-color 0.2s;
  }
  .task-card.running { border-color: var(--accent); }
  .task-card.failed { border-color: var(--danger); }

  .task-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .task-title {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .badge {
    flex-shrink: 0;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .badge-pending   { background: #2a2a2a; color: var(--text2); }
  .badge-ready     { background: #1a2a3a; color: var(--info); }
  .badge-running   { background: #0d2b14; color: var(--accent); }
  .badge-succeeded { background: #0d2b14; color: var(--accent); }
  .badge-failed    { background: #2b0d0d; color: var(--danger); }
  .badge-cancelled { background: #2a2a2a; color: var(--text2); }
  .badge-paused    { background: #2b2200; color: var(--warn); }
  .badge-retrying  { background: #1a1a2b; color: var(--info); }
  .badge-provisioning { background: #1a2a3a; color: var(--info); }

  .task-meta {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .task-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── Agent cards ── */
  #agent-list { display: flex; flex-direction: column; gap: 8px; }
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .agent-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: var(--text2);
  }
  .agent-dot.busy { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .agent-dot.idle { background: var(--text2); }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-sub { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Stats ── */
  #stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 14px;
    transition: transform 0.25s ease;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent); color: var(--accent); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* ── Empty state ── */
  .empty { color: var(--text2); font-size: 14px; text-align: center; padding: 24px 0; }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Tunnel info ── */
  #tunnel-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 12px;
    word-break: break-all;
  }
  #tunnel-info strong { color: var(--text); }
</style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>Agent Office</h1>
  <button class="btn btn-ghost btn-sm" id="refresh-btn">↻</button>
</header>

<!-- Auth screen -->
<div id="auth-screen">
  <h2>🔐 원격 접속</h2>
  <p>~/.agent-office/remote-token.txt에서 토큰을 확인하세요</p>
  <input id="token-input" type="text" placeholder="토큰 입력..." autocomplete="off" autocapitalize="none" spellcheck="false">
  <button class="btn btn-primary btn-full" id="login-btn" style="max-width:340px">접속</button>
</div>

<!-- Main app -->
<div id="app">

  <!-- Stats -->
  <section>
    <div class="section-title">현황</div>
    <div id="stats-grid">
      <div class="stat-card"><div class="stat-value" id="stat-agents">-</div><div class="stat-label">에이전트</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-running">-</div><div class="stat-label">실행중</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-tasks">-</div><div class="stat-label">작업</div></div>
    </div>
  </section>

  <!-- New Task -->
  <section>
    <div class="section-title">새 작업 제출</div>
    <div class="form-group">
      <label>작업 내용</label>
      <textarea id="task-prompt" placeholder="Claude에게 맡길 작업을 입력하세요..."></textarea>
    </div>
    <div class="form-group">
      <label>저장소 경로 (선택)</label>
      <input type="text" id="task-repo" placeholder="C:\Users\..." autocapitalize="none">
    </div>
    <div class="row">
      <div class="form-group">
        <label>Provider</label>
        <select id="task-provider">
          <option value="claude">Claude</option>
          <option value="codex">Codex</option>
          <option value="gemini">Gemini</option>
        </select>
      </div>
      <button class="btn btn-primary" id="submit-btn">제출</button>
    </div>
  </section>

  <!-- Active Tasks -->
  <section>
    <div class="section-title">작업 목록</div>
    <div id="task-list"><div class="empty">작업 없음</div></div>
  </section>

  <!-- Agents -->
  <section>
    <div class="section-title">활성 에이전트</div>
    <div id="agent-list"><div class="empty">활성 에이전트 없음</div></div>
  </section>

</div>

<div id="toast"></div>

<script>
const BASE = window.location.origin;
let TOKEN = localStorage.getItem('remote_token') || '';
let pollTimer = null;

// ── Token from URL param ──
const urlToken = new URLSearchParams(location.search).get('token');
if (urlToken) {
  TOKEN = urlToken;
  localStorage.setItem('remote_token', TOKEN);
  history.replaceState({}, '', location.pathname);
}

// ── Auth ──
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  startPolling();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  stopPolling();
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const input = document.getElementById('token-input').value.trim();
  if (!input) return;
  TOKEN = input;
  // Test token by doing a write-capable probe (checking health then a write)
  try {
    const r = await fetch(`${BASE}/api/health`);
    if (r.ok) {
      localStorage.setItem('remote_token', TOKEN);
      showApp();
    }
  } catch {
    showToast('서버에 연결할 수 없습니다', 'error');
  }
});

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// ── API helpers ──
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${TOKEN}`,
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${BASE}${path}`, opts);
  if (r.status === 401) {
    localStorage.removeItem('remote_token');
    showAuth();
    showToast('토큰이 유효하지 않습니다', 'error');
    throw new Error('Unauthorized');
  }
  return r.json();
}

// ── Toast ──
let toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// ── Status dot ──
async function checkHealth() {
  try {
    const r = await fetch(`${BASE}/api/health`);
    document.getElementById('status-dot').className = r.ok ? 'ok' : 'err';
  } catch {
    document.getElementById('status-dot').className = 'err';
  }
}

// ── Render helpers ──
const STATUS_LABEL = {
  pending: '대기', ready: '준비', provisioning: '준비중', running: '실행중',
  succeeded: '완료', failed: '실패', cancelled: '취소', paused: '일시정지', retrying: '재시도',
};

function badgeClass(status) {
  const map = {
    pending: 'badge-pending', ready: 'badge-ready', provisioning: 'badge-provisioning',
    running: 'badge-running', succeeded: 'badge-succeeded', failed: 'badge-failed',
    cancelled: 'badge-cancelled', paused: 'badge-paused', retrying: 'badge-retrying',
  };
  return map[status] || 'badge-pending';
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return `${d}초 전`;
  if (d < 3600) return `${Math.floor(d/60)}분 전`;
  return `${Math.floor(d/3600)}시간 전`;
}

function truncate(str, max = 80) {
  if (!str) return '(제목 없음)';
  return str.length > max ? str.slice(0, max) + '…' : str;
}

// ── Render tasks ──
function renderTasks(tasks) {
  const container = document.getElementById('task-list');
  if (!tasks.length) { container.innerHTML = '<div class="empty">작업 없음</div>'; return; }

  const sorted = [...tasks].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  container.innerHTML = sorted.map(t => {
    const isRunning = ['running', 'provisioning', 'retrying'].includes(t.status);
    const canCancel = ['pending', 'ready', 'running', 'provisioning'].includes(t.status);
    const canRetry  = ['failed', 'cancelled'].includes(t.status);
    const canPause  = t.status === 'running';
    const canResume = t.status === 'paused';

    return `
    <div class="task-card ${isRunning ? 'running' : ''} ${t.status === 'failed' ? 'failed' : ''}">
      <div class="task-header">
        <div class="task-title">${escHtml(truncate(t.title || t.prompt || ''))}</div>
        <span class="badge ${badgeClass(t.status)}">${STATUS_LABEL[t.status] || t.status}</span>
      </div>
      <div class="task-meta">
        ${t.provider ? `<span>${t.provider}</span>` : ''}
        ${t.createdAt ? `<span>${timeAgo(t.createdAt)}</span>` : ''}
        ${t.repositoryPath ? `<span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(t.repositoryPath)}">📁 ${escHtml(t.repositoryPath.split(/[\\/]/).pop() || t.repositoryPath)}</span>` : ''}
      </div>
      <div class="task-actions">
        ${canCancel  ? `<button class="btn btn-ghost btn-sm" onclick="taskAction('${t.id}','cancel')">취소</button>` : ''}
        ${canPause   ? `<button class="btn btn-ghost btn-sm" onclick="taskAction('${t.id}','pause')">일시정지</button>` : ''}
        ${canResume  ? `<button class="btn btn-ghost btn-sm" onclick="taskAction('${t.id}','resume')">재개</button>` : ''}
        ${canRetry   ? `<button class="btn btn-ghost btn-sm" onclick="taskAction('${t.id}','retry')">재시도</button>` : ''}
        ${['succeeded','failed','cancelled'].includes(t.status) ? `<button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">삭제</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Render agents ──
function renderAgents(agents) {
  const container = document.getElementById('agent-list');
  if (!agents.length) { container.innerHTML = '<div class="empty">활성 에이전트 없음</div>'; return; }

  container.innerHTML = agents.map(a => {
    const busy = a.status === 'busy' || a.state === 'busy';
    const label = a.currentFile || a.projectPath || a.cwd || '';
    return `
    <div class="agent-card">
      <div class="agent-dot ${busy ? 'busy' : 'idle'}"></div>
      <div class="agent-info">
        <div class="agent-name">${escHtml(a.name || a.registryId || a.id || 'Unknown')}</div>
        ${label ? `<div class="agent-sub" title="${escHtml(label)}">${escHtml(label.split(/[\\/]/).pop() || label)}</div>` : ''}
      </div>
      <span style="font-size:12px;color:var(--text2)">${a.provider || ''}</span>
    </div>`;
  }).join('');
}

// ── Task actions ──
async function taskAction(id, action) {
  try {
    await api('POST', `/api/tasks/${id}/${action}`);
    showToast(`${action} 완료`);
    await refresh();
  } catch (e) {
    if (e.message !== 'Unauthorized') showToast(e.message, 'error');
  }
}

async function deleteTask(id) {
  try {
    await api('DELETE', `/api/tasks/${id}`);
    showToast('삭제 완료');
    await refresh();
  } catch (e) {
    if (e.message !== 'Unauthorized') showToast(e.message, 'error');
  }
}

// ── Submit task ──
document.getElementById('submit-btn').addEventListener('click', async () => {
  const prompt = document.getElementById('task-prompt').value.trim();
  if (!prompt) { showToast('작업 내용을 입력하세요', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const body = {
      prompt,
      provider: document.getElementById('task-provider').value,
    };
    const repo = document.getElementById('task-repo').value.trim();
    if (repo) body.repositoryPath = repo;

    await api('POST', '/api/tasks', body);
    document.getElementById('task-prompt').value = '';
    showToast('작업 제출 완료!');
    await refresh();
  } catch (e) {
    if (e.message !== 'Unauthorized') showToast('제출 실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '제출';
  }
});

// ── Refresh ──
async function refresh() {
  try {
    const [tasks, agents] = await Promise.all([
      fetch(`${BASE}/api/tasks`).then(r => r.json()),
      fetch(`${BASE}/api/agents`).then(r => r.json()),
    ]);

    renderTasks(Array.isArray(tasks) ? tasks : []);
    renderAgents(Array.isArray(agents) ? agents : []);

    const running = (Array.isArray(tasks) ? tasks : []).filter(t => ['running','provisioning','retrying'].includes(t.status)).length;
    document.getElementById('stat-agents').textContent = Array.isArray(agents) ? agents.length : 0;
    document.getElementById('stat-running').textContent = running;
    document.getElementById('stat-tasks').textContent = Array.isArray(tasks) ? tasks.length : 0;

    await checkHealth();
  } catch (e) {
    console.error('refresh error', e);
  }
}

document.getElementById('refresh-btn').addEventListener('click', () => refresh());

// ── Polling ──
function startPolling() {
  refresh();
  pollTimer = setInterval(refresh, 4000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── Escape HTML ──
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
if (TOKEN) {
  showApp();
} else {
  showAuth();
}
</script>
</body>
</html>
